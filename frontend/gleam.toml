name = "frontend"
version = "1.0.0"

target = "javascript"

# Fill out these fields if you intend to generate HTML documentation or publish
# your project to the Hex package manager.
#
# description = ""
# licences = ["Apache-2.0"]
# repository = { type = "github", user = "", repo = "" }
# links = [{ title = "Website", href = "" }]
#
# For a full reference of all the available options, you can have a look at
# https://gleam.run/writing-gleam/gleam-toml/.

[dependencies]
gleam_stdlib = ">= 0.44.0 and < 2.0.0"
middle = { path = "../middle" }
lustre = ">= 5.6.0 and < 6.0.0"
rsvp = ">= 1.2.0 and < 2.0.0"
modem = ">= 2.1.2 and < 3.0.0"

[dev_dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
lustre_dev_tools = ">= 2.3.5 and < 3.0.0"

[tools.lustre.bin]
# use system install bins or download them
bun = "system"
tailwindcss = "system"
# gleam/httpc download timeout option in seconds for bun/tailwind cli executable DLs (default: 60s)
timeout = 120

[tools.lustre.build]
minify = true
# Build the application into our server's `priv/static` directory so it can be
# deployed together with the backend.
# outdir = "../server/priv/static"
# TODO: configure out dir

[tools.lustre.dev]
host = "localhost"
port = 1234
# Configure an API proxy to forward requests to our backend during development.
# This lets us avoid CORS issues while the frontend and backend are running on
# different ports.
proxy = { from = "/api", to = "http://localhost:8080/api" }

[tools.lustre.html]
# Include Bootstrap in our project for simple styling.
# stylesheets = [{ href = "https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" }]
# scripts = [{ src = "https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" }]
